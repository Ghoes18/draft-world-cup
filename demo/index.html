<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>7a0 — 2D Match Demo (M2)</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
        background: #0f1410;
        color: #e8ece9;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1rem;
        gap: 1rem;
      }
      h1 { font-size: 1.1rem; font-weight: 600; margin: 0; opacity: 0.9; }
      .panel {
        width: min(960px, 100%);
        display: grid;
        gap: 0.75rem;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: end;
      }
      label {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        font-size: 0.75rem;
        opacity: 0.85;
      }
      input, select, button {
        font: inherit;
        padding: 0.35rem 0.5rem;
        border-radius: 6px;
        border: 1px solid #3a4a3f;
        background: #1a221c;
        color: inherit;
      }
      button {
        cursor: pointer;
        background: #2d4a36;
        border-color: #3d6a48;
      }
      button:hover { filter: brightness(1.08); }
      .stage {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 10;
        background: #0a0f0c;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #2a3a30;
      }
      #pitch {
        width: 100%;
        height: 100%;
        display: block;
      }
      #fast-text {
        display: none;
        position: absolute;
        inset: 0;
        overflow: auto;
        padding: 1rem;
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
        line-height: 1.5;
        white-space: pre-wrap;
      }
      .hud {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <h1>7a0 — 2D Match Demo</h1>
    <div class="panel">
      <div class="controls">
        <label>Home overall <input id="home-overall" type="number" min="50" max="99" value="85" /></label>
        <label>Away overall <input id="away-overall" type="number" min="50" max="99" value="72" /></label>
        <label>Seed <input id="seed" type="text" value="demo-seed" /></label>
        <label>Mode
          <select id="mode">
            <option value="replay">Replay (timeline)</option>
            <option value="live">Live AI</option>
          </select>
        </label>
        <button id="simulate" type="button">Simulate</button>
        <button id="play" type="button">Play</button>
        <button id="pause" type="button">Pause</button>
        <button id="skip" type="button">Skip to FT</button>
        <label>Rate
          <select id="rate">
            <option value="1">1×</option>
            <option value="2">2×</option>
          </select>
        </label>
        <label>Knockout <input id="knockout" type="checkbox" /></label>
        <label>Tier
          <select id="tier">
            <option value="normal">Normal (2D)</option>
            <option value="fast">Fast (text)</option>
            <option value="ultra">Ultra Fast</option>
          </select>
        </label>
      </div>
      <div class="stage">
        <canvas id="pitch"></canvas>
        <pre id="fast-text" aria-live="polite"></pre>
      </div>
      <div class="hud">
        <span id="result">—</span>
        <span id="fps">FPS: —</span>
      </div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
